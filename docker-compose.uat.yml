services:
  fdaapi_uat:
    image: xuhoit/fda_api-fdaapi:uat
    container_name: fdaapi_uat 
    ports:
      - "7097:8080" 
    env_file: .env
    environment:
      ASPNETCORE_ENVIRONMENT: UAT
      ConnectionStrings__PostgreSQLConnection: Host=postgres;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD};SearchPath=uat_schema
    networks:
      - fda_api_default

networks:
  fda_api_default:
    external: true
    name: fda_api_shared_network