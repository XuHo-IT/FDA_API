services:
  fdaapi_uat:
    image: xuhoit/fda_api-fdaapi:uat
    container_name: fdaapi_uat 
    ports:
      - "7097:8080"
    env_file: .env.uat  # Use UAT-specific environment file
    pull_policy: always
    environment:
      # Override critical environment variables to ensure correct values
      ASPNETCORE_ENVIRONMENT: UAT
      ASPNETCORE_URLS: http://0.0.0.0:8080
      ASPNETCORE_FORWARDEDHEADERS_ENABLED: "true"
      # CRITICAL: Override connection string to use container name instead of IP
      # Container name works within Docker network, IP may not be accessible
      ConnectionStrings__PostgreSQLConnection: >
        Host=fda_postgres_shared;
        Port=5432;
        Database=${POSTGRES_DB_UAT};
        Username=${POSTGRES_USER};
        Password=${POSTGRES_PASSWORD}
      # NO SearchPath - using default schema (public) in separate database
      GraphHopper__BaseUrl: ${GRAPHHOPPER_BASE_URL:-http://graphhopper_dev:8989}
    networks:
      - fda_api_default
    restart: unless-stopped

networks:
  fda_api_default:
    external: true
    name: fda_api_shared_network