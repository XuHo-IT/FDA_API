name: dev-cd

on:
  push:
    branches:
      - dev
  pull_request:
    branches:
      - dev
    types:
      - closed

jobs:
  publish-source:
    name: 🚀 Publish new change to dev server
    runs-on: ubuntu-22.04

    # Chạy khi: push trực tiếp HOẶC merge PR (không chạy nếu close PR mà không merge)
    if: |
      github.event_name == 'push' ||
      (github.event_name == 'pull_request' && github.event.pull_request.merged == true)

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🔐 Deploy to VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          port: ${{ secrets.SSH_PORT }}
          script_stop: true
          script: |
            set -e
            cd /home/dev/FDA_API
            git fetch origin
            git reset --hard origin/dev
            docker login -u "${{ secrets.DOCKER_USERNAME }}" -p "${{ secrets.DOCKER_PASSWORD }}"
            # Sử dụng -p fda_dev để tách biệt hoàn toàn với UAT
            # Dùng up -d --build trực tiếp thay vì down để Postgres không bị ngắt quãng
            docker compose -p fda_dev -f docker-compose.dev.yml up -d --build --remove-orphans
            docker image prune -f
