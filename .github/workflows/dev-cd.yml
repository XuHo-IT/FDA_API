name: dev-cd

on:
  push:
    branches:
      - dev
  pull_request:
    branches:
      - dev
    types:
      - closed

jobs:
  publish-source:
    name: 🚀 Publish new change to dev server
    runs-on: ubuntu-22.04

    # Chạy khi: push trực tiếp HOẶC merge PR (không chạy nếu close PR mà không merge)
    if: |
      github.event_name == 'push' ||
      (github.event_name == 'pull_request' && github.event.pull_request.merged == true)

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🔐 Deploy to VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          port: ${{ secrets.SSH_PORT }}
          script_stop: true
          script: |
            set -e
            cd /home/dev/FDA_API

            # 1. Update code
            git fetch origin
            git reset --hard origin/dev

            # 2. Log in and drag the new image to the front (to reduce downtime).
            echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
            docker compose -f docker-compose.dev.yml pull

            # 3.Deploy
            docker compose -p fda_dev --env-file .env -f docker-compose.dev.yml up -d --remove-orphans --force-recreate

            # 4.Remove "dangling" images (those without tags) and build cache unnecessary files.
            docker system prune -f

            # 5. Delete all old images that have been replaced by 'latest'.
            docker image prune -a -f --filter "until=24h"
