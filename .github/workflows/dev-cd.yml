name: dev-cd

on:
  push:
    branches:
      - dev
  pull_request:
    branches:
      - dev
    types:
      - closed

jobs:
  publish-source:
    name: 🚀 Publish new change to dev server
    runs-on: ubuntu-22.04

    # Chạy khi: push trực tiếp HOẶC merge PR (không chạy nếu close PR mà không merge)
    if: |
      github.event_name == 'push' ||
      (github.event_name == 'pull_request' && github.event.pull_request.merged == true)

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🔐 Deploy to VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          port: ${{ secrets.SSH_PORT }}
          script_stop: true
          script: |
           script: |
            set -e
            cd /home/dev/FDA_API
            
            # Cập nhật code cấu hình
            git fetch origin
            git reset --hard origin/dev
            
            # Đăng nhập
            echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
            
            # 1. Hạ container cũ xuống trước để tránh Conflict tên
            echo "🛑 Stopping old containers..."
            docker compose -p fda_dev -f docker-compose.dev.yml down --remove-orphans
            
            # 2. Pull image mới
            echo "📥 Pulling latest images..."
            docker compose -p fda_dev -f docker-compose.dev.yml pull
            
            # 3. Khởi chạy lại hệ thống mới
            echo "🚀 Deploying new version..."
            docker compose -p fda_dev --env-file .env -f docker-compose.dev.yml up -d
            
            # 4. Dọn dẹp image cũ và rác để giải phóng dung lượng (Mục tiêu giảm nặng)
            echo "🧹 Cleaning up..."
            docker system prune -f
