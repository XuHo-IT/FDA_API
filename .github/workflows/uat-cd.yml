name: uat-cd

on:
  push:
    branches:
      - uat
  pull_request:
    branches:
      - uat
    types:
      - closed
  workflow_dispatch: # Cho phép trigger thủ công

jobs:
  deploy-uat:
    name: 🚀 Deploy to UAT Server
    runs-on: ubuntu-22.04

    # Chạy khi: push trực tiếp HOẶC merge PR (không chạy nếu close PR mà không merge) HOẶC manual trigger
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'push' ||
      (github.event_name == 'pull_request' && github.event.pull_request.merged == true)

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🔐 Deploy to VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          port: ${{ secrets.SSH_PORT }}
          script_stop: true
          script: |
            set -e
            echo "🚀 Starting UAT deployment..."
            
            # Navigate to project directory
            cd /home/dev/FDA_API || cd /path/to/FDA_Api
            
            # Login to Docker Hub
            echo "🔐 Logging in to Docker Hub..."
            docker login -u "${{ secrets.DOCKER_USERNAME }}" -p "${{ secrets.DOCKER_PASSWORD }}"
            
            # Pull latest UAT image
            echo "📥 Pulling latest UAT image..."
            docker compose -p fda_uat --env-file .env.uat -f docker-compose.uat.yml pull
            
            # Start/Recreate container (--force-recreate thay vì down để tránh drop network và downtime)
            echo "▶️ Starting/Recreating UAT container..."
            docker compose -p fda_uat --env-file .env.uat -f docker-compose.uat.yml up -d --force-recreate
            
            # Wait for container to start
            echo "⏳ Waiting for container to be ready..."
            sleep 10
            
            # Check container status
            echo "📊 Checking container status..."
            docker ps --filter "name=fdaapi_uat" --format "table {{.Names}}\t{{.Status}}"
           
            # Show recent logs
            echo "📋 Recent logs:"
            docker compose -p fda_uat -f docker-compose.uat.yml logs --tail=50
            
            # Clean up unused images
            echo "🧹 Cleaning up unused images..."
            docker image prune -f
            
            echo "✅ UAT deployment completed!"

      - name: 🏥 Health Check
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          port: ${{ secrets.SSH_PORT }}
          script_stop: true
          script: |
            set -e
            echo "🏥 Running health checks..."
            cd /home/dev/FDA_API

            # Kiểm tra xem container có đang Up không
            CONTAINER_STATUS=$(docker ps --filter "name=fdaapi_uat" --format "{{.Status}}")
            if [ -z "$CONTAINER_STATUS" ]; then
              echo "❌ Container fdaapi_uat is not running!"
              exit 1
            fi
            echo "✅ Container status: $CONTAINER_STATUS"
            
            # QUAN TRỌNG: Thêm --env-file .env.uat vào lệnh logs để tránh lỗi warning/exit 1
            echo "🔍 Scanning logs for errors..."
            ERROR_COUNT=$(docker compose -p fda_uat --env-file .env.uat -f docker-compose.uat.yml logs --tail=100 | grep -i "error\|exception\|failed" | wc -l)
            
            if [ "$ERROR_COUNT" -gt 0 ]; then
              echo "⚠️ Found $ERROR_COUNT potential errors in logs:"
              docker compose -p fda_uat --env-file .env.uat -f docker-compose.uat.yml logs --tail=50 | grep -i "error\|exception\|failed" | head -n 10
            else
              echo "✅ No errors found in recent logs"
            fi

            # Kiểm tra xem DB Connection có nhận đúng tên DB không (Tránh Database=;)
            if docker inspect fdaapi_uat | grep -q "Database=FDA_UAT"; then
              echo "✅ Database connection string verified: FDA_UAT"
            else
              echo "❌ Database name is missing in connection string!"
              exit 1
            fi
            
            echo "✅ Health checks completed!"

