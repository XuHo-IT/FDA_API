name: uat-ci

on:
  push:
    branches: ["uat"]
  pull_request:
    branches: ["uat"]

jobs:
  # Gộp Analyze và Build vào làm 1 để CodeQL bắt được quá trình biên dịch
  Build-and-Analyze:
    name: 🔍 Analyze & Build (.NET 8)
    runs-on: ubuntu-22.04
    permissions:
      security-events: write
      contents: read
      actions: read

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: ⚙️ Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
          include-prerelease: true

      - name: 🔧 Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: csharp
          build-mode: manual # Bắt buộc dùng manual khi đổi tên project

      - name: 📦 Restore dependencies
        run: dotnet restore FDA_Api.sln

      - name: 🏗️ Build app
        # CodeQL sẽ "nghe" lệnh build này để phân tích
        run: dotnet build FDA_Api.sln --no-restore -c Release

      - name: 🛡️ Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:csharp"

  # Job Docker chạy sau khi Job trên thành công
  Docker-Push:
    name: 🐳 Build and Push Docker Image (UAT)
    runs-on: ubuntu-22.04
    needs: [Build-and-Analyze] 
    env:
      DOCKER_IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/fda_api-fdaapi
      IMAGE_TAG: uat
      COMMIT_SHA: ${{ github.sha }}

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🔧 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔐 Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: 🚀 Build and Push Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE_NAME }}:${{ env.IMAGE_TAG }}
            ${{ env.DOCKER_IMAGE_NAME }}:${{ env.IMAGE_TAG }}-${{ github.sha }}
            ${{ env.DOCKER_IMAGE_NAME }}:${{ env.IMAGE_TAG }}-${{ github.run_number }}
          cache-from: type=registry,ref=${{ env.DOCKER_IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          cache-to: type=inline

